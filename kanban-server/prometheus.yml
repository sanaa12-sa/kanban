global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    project: 'kanban-app'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kanban-server'
    static_configs:
      - targets: ['kanban-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s