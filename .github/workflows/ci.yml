name: CI/CD Kanban App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kanban_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -f kanban-server/pom.xml

      - name: Run tests
        run: mvn test -f kanban-server/pom.xml
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: kanban_db
          DB_USER: root
          DB_PASSWORD: root

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: kanban-server/target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kanban-server ./kanban-server

      - name: Verify Docker image
        run: |
          docker image inspect kanban-server --format='Image built: {{.Id}}'
          echo "Docker image verified OK"

      - name: Save Docker image as artifact
        run: docker save kanban-server | gzip > kanban-server.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: kanban-server.tar.gz

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < kanban-server.tar.gz

      - name: Deploy with Docker Compose
        run: |
          cd kanban-server
          docker compose up -d
          echo "Application deployee sur staging"

      - name: Health check
        run: |
          sleep 10
          docker ps | grep kanban-server && echo "Container running OK" || echo "Container not running"

      - name: Notify deployment
        run: |
          echo "Deployment completed at $(date)"
          echo "Version: ${{ github.sha }}"